<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nueva contraseña · Analyze-This</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #0F1117; margin: 0;
      color: #E2E8F0;
    }
    .card {
      background: #161B27; border: 1px solid #2A2D3A; border-radius: 14px;
      padding: 2.5rem 2rem; width: 100%; max-width: 400px;
    }
    h2 { margin: 0 0 0.25rem; font-size: 1.3rem; font-weight: 700; }
    p  { margin: 0 0 1.5rem; font-size: 0.875rem; color: #8B96A0; }
    label { display: block; font-size: 0.8rem; font-weight: 500; color: #94A3B8; margin-bottom: 0.35rem; }
    input {
      width: 100%; padding: 0.65rem 0.85rem; border-radius: 8px;
      border: 1px solid #2A2D3A; background: #1E2535; color: #E2E8F0;
      font-size: 0.9rem; margin-bottom: 1rem; outline: none;
    }
    input:focus { border-color: #6366F1; }
    button {
      width: 100%; padding: 0.75rem; border-radius: 8px; border: none;
      background: #6366F1; color: #fff; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; margin-top: 0.25rem;
    }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    .msg { margin-top: 1rem; font-size: 0.85rem; text-align: center; display: none; }
    .msg.ok  { color: #22C55E; }
    .msg.err { color: #EF4444; }
    .logo { text-align: center; margin-bottom: 1.5rem; font-size: 1.1rem; font-weight: 700; }
    .logo span { color: #6366F1; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Analyze<span>-This</span></div>
  <h2>Crear nueva contraseña</h2>
  <p>Ingresa tu nueva contraseña para continuar.</p>
  <div>
    <label for="pw1">Nueva contraseña</label>
    <input type="password" id="pw1" placeholder="Mínimo 8 caracteres" autocomplete="new-password">
    <label for="pw2">Confirmar contraseña</label>
    <input type="password" id="pw2" placeholder="Repite la contraseña" autocomplete="new-password">
    <button id="btn-save" onclick="savePassword()">Guardar contraseña</button>
    <div class="msg" id="msg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
(async () => {
  const SUPABASE_URL = "{{ SUPABASE_URL | default('') }}";
  const SUPABASE_KEY = "{{ SUPABASE_KEY | default('') }}";

  if (!SUPABASE_URL || !SUPABASE_KEY) {
    showMsg('Error de configuración. Vuelve a solicitar el link de reset.', false);
    return;
  }

  const access  = sessionStorage.getItem('recovery_access');
  const refresh = sessionStorage.getItem('recovery_refresh');

  if (!access) {
    showMsg('Link expirado o inválido. Solicita uno nuevo.', false);
    document.getElementById('btn-save').disabled = true;
    return;
  }

  // Restore the recovery session in the Supabase client
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY, { auth: { flowType: 'pkce' } });
  await sb.auth.setSession({ access_token: access, refresh_token: refresh });

  window.savePassword = async function() {
    const pw1 = document.getElementById('pw1').value;
    const pw2 = document.getElementById('pw2').value;
    if (!pw1 || pw1.length < 8) { showMsg('La contraseña debe tener al menos 8 caracteres.', false); return; }
    if (pw1 !== pw2) { showMsg('Las contraseñas no coinciden.', false); return; }
    const btn = document.getElementById('btn-save');
    btn.disabled = true;
    btn.textContent = 'Guardando…';
    const { error } = await sb.auth.updateUser({ password: pw1 });
    if (error) {
      showMsg('Error: ' + error.message, false);
      btn.disabled = false;
      btn.textContent = 'Guardar contraseña';
    } else {
      sessionStorage.removeItem('recovery_access');
      sessionStorage.removeItem('recovery_refresh');
      showMsg('Contraseña actualizada. Redirigiendo…', true);
      setTimeout(() => { window.location.href = '/'; }, 1800);
    }
  };

  function showMsg(text, ok) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'msg ' + (ok ? 'ok' : 'err');
    el.style.display = 'block';
  }
})();
</script>
</body>
</html>
